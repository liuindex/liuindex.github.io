<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <rect width="900" height="600" fill="#ffffff"/>
  <g transform="translate(450, 300)">
    <circle r="150" fill="#ffffff"/>
    <path d="M-75,-75 A150,150 0 0,0 75,75" fill="#c60c30"/>
    <path d="M75,-75 A150,150 0 0,1 -75,75" fill="#003478"/>
  </g>
  <!-- Trigrams -->
  <g stroke="#000000" stroke-width="10">
    <!-- Heaven -->
    <line x1="150" y1="120" x2="250" y2="120"/>
    <line x1="150" y1="150" x2="250" y2="150"/>
    <line x1="150" y1="180" x2="250" y2="180"/>
    <!-- Lake -->
    <line x1="650" y1="120" x2="750" y2="120"/>
    <line x1="650" y1="150" x2="750" y2="150"/>
    <line x1="680" y1="180" x2="750" y2="180"/>
    <!-- Fire -->
    <line x1="150" y1="420" x2="250" y2="420"/>
    <line x1="180" y1="450" x2="250" y2="450"/>
    <line x1="150" y1="480" x2="250" y2="480"/>
    <!-- Earth -->
    <line x1="650" y1="420" x2="750" y2="420"/>
    <line x1="680" y1="450" x2="750" y2="450"/>
    <line x1="680" y1="480" x2="750" y2="480"/>
  </g>
</svg>