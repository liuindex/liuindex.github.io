    <path d="M750,350 L755,365 L770,365 L760,375 L765,390 L750,380 L735,390 L740,375 L730,365 L745,365 Z"/>
    <path d="M650,250 L655,265 L670,265 L660,275 L665,290 L650,280 L635,290 L640,275 L630,265 L645,265 Z"/>
    <path d="M850,250 L855,265 L870,265 L860,275 L865,290 L850,280 L835,290 L840,275 L830,265 L845,265 Z"/>
    <path d="M900,400 L905,415 L920,415 L910,425 L915,440 L900,430 L885,440 L890,425 L880,415 L895,415 Z"/>
