    <rect width="600" height="300" fill="#00008B"/>
    <path d="M0,0 L600,300 M600,0 L0,300" stroke="#ffffff" stroke-width="60"/>
    <path d="M0,0 L600,300 M600,0 L0,300" stroke="#ff0000" stroke-width="40"/>
    <path d="M300,0 L300,300 M0,150 L600,150" stroke="#ffffff" stroke-width="100"/>
    <path d="M300,0 L300,300 M0,150 L600,150" stroke="#ff0000" stroke-width="60"/>
  </g>
  <!-- Commonwealth Star -->
  <g fill="#ffffff">
    <path d="M600,140 L615,185 L660,185 L625,215 L640,260 L600,235 L560,260 L575,215 L540,185 L585,185 Z"/>
